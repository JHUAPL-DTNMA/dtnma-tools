name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          submodules: recursive
      - name: Prep
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              cmake ninja-build \
              ruby pkg-config gcc g++ ccache patch autoconf libtool \
              flex libfl-dev bison civetweb libcivetweb-dev libssl-dev libcjson-dev libsystemd-dev libpq-dev libpcre2-dev \
              xmlstarlet \
              python3 python3-pip python3-wheel
          pip3 install gcovr
          ./build.sh deps
          ./build.sh prep -DTEST_MEMCHECK=OFF -DBUILD_COVERAGE=ON -DBUILD_DOCS_API=OFF -DBUILD_DOCS_MAN=OFF
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v7
      - name: Run Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir ${{env.BUILD_WRAPPER_OUT_DIR}} ./build.sh
      - name: Install
        run: ./build.sh install
      - name: Test
        env:
          TEST_LOG_LEVEL: 'info'
          DB_HOST: 'postgres'
          DB_USER: 'tester'
          DB_PASSWORD: 'tester'
        run: |
          ./build.sh check
          ./item-test/run.sh prep
          ./item-test/run.sh test
      - name: Collect coverage
        run: |
          ./build.sh --target coverage-sonarqube -v
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
        with:
          args: >
            --define sonar.coverageReportPaths=build/default/coverage-sonarqube.xml
            --define "sonar.cfamily.compile-commands=${{env.BUILD_WRAPPER_OUT_DIR}}/compile_commands.json"
