name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    services:
      postgres:
        # Docker Hub image
        image: postgres:16
        env:
          POSTGRES_USER: tester
          POSTGRES_PASSWORD: tester
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    permissions:
      contents: read
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    steps:
      - name: Set up OS
        env:
          PIP_BREAK_SYSTEM_PACKAGES: 1
        run: |
          apt-get update
          apt-get install -y \
              git rsync curl \
              cmake ninja-build \
              ruby pkg-config gcc g++ ccache patch autoconf libtool \
              flex libfl-dev bison civetweb libcivetweb-dev libssl-dev libcjson-dev libsystemd-dev libpq-dev libpcre2-dev \
              binutils \
              valgrind xmlstarlet \
              python3-pip python3-wheel python3-venv postgresql-client
          pip3 install gcovr
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
          submodules: recursive
      - name: Dependencies
        env:
          DEPS_BUILD_ION: '0'
        run: ./deps.sh
      - name: Prep
        run: >
          ./prep.sh
          -DBUILD_DOCS_API=OFF -DBUILD_DOCS_MAN=OFF
          -DBUILD_UNITTEST=ON
          -DTEST_MEMCHECK=OFF -DBUILD_COVERAGE=ON
          -DBUILD_ION_PROXY=OFF
          -DTRANSPORT_ION_BP=OFF
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: ./build.sh
      - name: Install
        run: ./build.sh install
      - name: System Path
        run: echo "/usr/lib/postgresql/16/bin" >>$GITHUB_PATH
      - name: Unit Test
        run: ./build.sh check
      - name: Item Test
        env:
          TEST_LOG_LEVEL: 'info'
          DB_HOST: 'postgres'
          DB_USER: 'tester'
          DB_PASSWORD: 'tester'
        run: |
          ./item-test/run.sh prep
          ./item-test/run.sh test
      - name: Collect coverage
        run: |
          ./build.sh --target coverage-sonarqube -v
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
        env:
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
        with:
          args: >
            --define sonar.cfamily.compile-commands=build/default/compile_commands.json
            --define sonar.coverageReportPaths=build/default/coverage-sonarqube.xml
